name: Playground Preview

on:
  pull_request:
    types: [opened, synchronize, closed]

env:
  PR_BRANCH: pr-${{ github.event.number }}-playground
  GIT_USER_NAME: GitHub Action
  GIT_USER_EMAIL: action@github.com

jobs:
  build-pull-request:
    name: Generate WordPress Playground Preview
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Delete existing playground branch for PR (if any)
        run: |
          if git ls-remote --exit-code --heads origin "$PR_BRANCH"; then
            git push origin --delete "$PR_BRANCH"
          fi

      - name: Create new playground branch
        run: git checkout -b "$PR_BRANCH"

      - name: Install dependencies (Composer & NPM)
        run: |
          composer install --no-dev --no-interaction --prefer-dist
          npm ci

      - name: Build project
        run: npm run build

      - name: Set up Git
        run: |
          git config --global user.name "$GIT_USER_NAME"
          git config --global user.email "$GIT_USER_EMAIL"

      - name: Commit and Push build files for playground
        run: |
          git add -f build/ vendor/
          git commit -m "Add build and vendor files for PR ${{ github.event.number }}"
          git push origin "$PR_BRANCH" --force

      - name: Post Playground preview details (create or update commit)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const branch = `pr-${prNumber}-playground`;

            const blueprint = {
              "$schema": "https://playground.wordpress.net/blueprint-schema.json",
              "landingPage": "/wp-admin/post-new.php?post_type=blueprint",
              "login": true,
              "features": { "networking": true },
              "steps": [
                {
                  "step": "updateUserMeta",
                  "meta": {
                    "admin_color": "modern",
                    "show_welcome_panel": 0
                  },
                  "userId": 1
                },
                {
                  "step": "setSiteOptions",
                  "options": { "blogname": "Visual Blueprint Builder" }
                },
                {
                  "step": "installPlugin",
                  "pluginData": {
                    "resource": "url",
                    "url": `https://github-proxy.com/proxy/?repo=${owner}/${repo}&branch=${branch}`
                  }
                }
              ]
            };

            const encoded = Buffer.from(JSON.stringify(blueprint)).toString('base64');
            const previewUrl = `https://playground.wordpress.net/#${encoded}`;
            const commentBody = `WordPress Playground PR [Preview](${previewUrl})`;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });

            const existing = comments.data.find(c => c.body.includes("WordPress Playground PR [Preview]"));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: commentBody,
              });
            }

      - name: Delete Playground branch on PR close
        if: github.event.action == 'closed'
        run: git push origin --delete "$PR_BRANCH"
