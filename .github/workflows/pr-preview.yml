name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, closed]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
      
      - name: Delete PR Playground branch (if any)
        run: |
          if git ls-remote --exit-code --heads origin pr-${{ github.event.number }}-playground; then
            echo "Remote branch 'pr-${{ github.event.number }}-playground' exists. Deleting..."
            git push origin --delete pr-${{ github.event.number }}-playground
          else
            echo "Remote branch 'pr-${{ github.event.number }}-playground' does not exist."
          fi
         
      - name: Create new branch for Playground Preview
        run: |
          git checkout -b pr-${{ github.event.number }}-playground

      - name: Install Composer dependencies
        run: |
          composer install --no-dev --no-interaction --prefer-dist

      - name: Install NPM Dependencies
        run: npm install

      - name: Run npm build
        run: npm run build

      - name: Add build files for Playground
        run: |
          git add -f build/
          git add -f vendor/

      - name: Commit and Push
        run: |
          git commit -m "Add build and vendors folders for PR ${{ github.event.number }}"
          git push origin pr-${{ github.event.number }}-playground --force

      - name: Share Playground detais on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            const blueprintJson = `{
              "$schema": "https://playground.wordpress.net/blueprint-schema.json",
              "landingPage": "/wp-admin/post-new.php?post_type=blueprint",
              "login": true,
              "features": {
                "networking": true
              },
              "steps": [
                {
                  "step": "updateUserMeta",
                  "meta": {
                    "admin_color": "modern",
                    "show_welcome_panel": 0
                  },
                  "userId": 1
                },
                {
                  "step": "setSiteOptions",
                  "options": {
                    "blogname": "Visual Blueprint Builder"
                  }
                },
                {
                  "step": "installPlugin",
                  "pluginData": {
                    "resource": "url",
                    "url": "https://github-proxy.com/proxy/?repo=${owner}/${repo}&branch=pr-${prNumber}-playground"
                  }
                }
              ]
            }`;
            const minifiedBlueprintJson = JSON.stringify(JSON.parse(blueprintJson));

            const previewUrl = `https://playground.wordpress.net/#${minifiedBlueprintJson}`;
            const body = `WordPress Playground PR [Preview](${previewUrl})`;
            
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              });

            const existing = comments.data.find(c => c.body.includes("WordPress Playground PR [Preview]"));
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Delete playground branch
        if: github.event_name == 'pull_request' && github.event.action == 'closed' || github.event_name == 'pull_request' && github.event.action == 'deleted'
        run: |
          git push origin --delete pr-${{ github.event.number }}-playground
